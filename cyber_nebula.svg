#!/usr/bin/env python3
"""
CYBER MATRIX CONTRIBUTION NEBULA
Generates an animated SVG for GitHub profile README
"""

import math

WIDTH = 900
HEIGHT = 128
COLS = 52
ROWS = 7
CELL = 13
GAP = 2
OFFSET_X = 20
OFFSET_Y = 14

def generate_svg():
    squares = []
    matrix_chars = []
    lightning_bolts = []
    wave_paths = []
    stars = []

    # Generate contribution squares with animations
    for col in range(COLS):
        for row in range(ROWS):
            x = OFFSET_X + col * (CELL + GAP)
            y = OFFSET_Y + row * (CELL + GAP)
            
            # Vary intensity based on position (simulate real contributions)
            intensity = (math.sin(col * 0.3 + row * 0.7) + 1) / 2
            intensity = max(0.05, intensity)
            
            # Color based on intensity
            if intensity < 0.2:
                color = "#0d1117"
                glow = "none"
                opacity = 0.4
            elif intensity < 0.4:
                color = "#003d4d"
                glow = "url(#glowLow)"
                opacity = 0.7
            elif intensity < 0.7:
                color = "#007a99"
                glow = "url(#glowMid)"
                opacity = 0.85
            else:
                color = "#00d9ff"
                glow = "url(#glowHigh)"
                opacity = 1.0

            delay = (col * 0.05 + row * 0.1) % 3
            pulse_delay = (col * 0.08 + row * 0.15) % 4
            glitch_delay = (col * 0.12) % 6

            square = f'''
  <rect x="{x}" y="{y}" width="{CELL}" height="{CELL}" rx="2"
    fill="{color}" opacity="{opacity}" filter="{glow}"
    class="square">
    <animate attributeName="opacity" 
      values="{opacity};{min(1.0, opacity+0.3)};{opacity};{max(0.1, opacity-0.2)};{opacity}"
      dur="{2 + pulse_delay:.1f}s" repeatCount="indefinite"
      begin="{delay:.2f}s"/>
    <animate attributeName="fill"
      values="{color};{'#00d9ff' if intensity > 0.3 else '#003d4d'};{color}"
      dur="{3 + glitch_delay:.1f}s" repeatCount="indefinite"
      begin="{glitch_delay:.2f}s"/>
  </rect>'''
            squares.append(square)

    # Matrix rain characters
    matrix_cols = [3, 8, 15, 22, 29, 36, 43, 49]
    chars = ["0", "1", "{", "}", "<", ">", "/", "\\", "A", "G", "B", "4", "9"]
    
    for i, mc in enumerate(matrix_cols):
        x = OFFSET_X + mc * (CELL + GAP) + 6
        delay = i * 0.4
        char = chars[i % len(chars)]
        
        for j in range(4):
            y_start = OFFSET_Y - 10 - j * 20
            char2 = chars[(i + j + 2) % len(chars)]
            matrix_chars.append(f'''
  <text x="{x}" y="{y_start}" fill="#00ff41" font-family="monospace" 
    font-size="9" opacity="0" font-weight="bold">
    {char2}
    <animate attributeName="y" 
      values="{y_start};{HEIGHT + 10}"
      dur="{1.5 + j * 0.3:.1f}s" repeatCount="indefinite"
      begin="{delay + j * 0.2:.2f}s"/>
    <animate attributeName="opacity"
      values="0;0.8;0.6;0.4;0"
      dur="{1.5 + j * 0.3:.1f}s" repeatCount="indefinite"
      begin="{delay + j * 0.2:.2f}s"/>
  </text>''')

    # Lightning bolts on high commit days
    lightning_positions = [10, 23, 37, 47]
    for i, lp in enumerate(lightning_positions):
        x = OFFSET_X + lp * (CELL + GAP) + 6
        delay = i * 1.5 + 0.5
        lightning_bolts.append(f'''
  <polyline points="{x},5 {x-4},45 {x+3},45 {x-3},90" 
    stroke="#ffff00" stroke-width="1.5" fill="none" opacity="0"
    stroke-linecap="round">
    <animate attributeName="opacity"
      values="0;0;0;0;0;1;0.8;0;0;0"
      dur="4s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
  </polyline>
  <polyline points="{x},5 {x-4},45 {x+3},45 {x-3},90"
    stroke="white" stroke-width="0.5" fill="none" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0;0.5;0.3;0;0;0"
      dur="4s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
  </polyline>''')

    # Cyan wave sweeping across
    for w in range(3):
        delay = w * 1.8
        wave_paths.append(f'''
  <line x1="{OFFSET_X - 10}" y1="0" x2="{OFFSET_X - 10}" y2="{HEIGHT}"
    stroke="#00d9ff" stroke-width="1.5" opacity="0">
    <animate attributeName="x1"
      values="{OFFSET_X - 10};{WIDTH + 10}"
      dur="3s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
    <animate attributeName="x2"
      values="{OFFSET_X - 10};{WIDTH + 10}"
      dur="3s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
    <animate attributeName="opacity"
      values="0;0.6;0.8;0.6;0"
      dur="3s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
  </line>''')

    # Twinkling stars (Barcelona red dots)
    star_positions = [(50, 8), (150, 20), (300, 5), (500, 15), 
                      (650, 8), (750, 18), (820, 6), (880, 12)]
    for i, (sx, sy) in enumerate(star_positions):
        delay = i * 0.7
        color = "#a50044" if i % 3 == 0 else "#00d9ff"
        stars.append(f'''
  <circle cx="{sx}" cy="{sy}" r="1.5" fill="{color}" opacity="0">
    <animate attributeName="opacity"
      values="0;1;0.5;1;0"
      dur="{1.5 + i * 0.3:.1f}s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
    <animate attributeName="r"
      values="1;2.5;1"
      dur="{1.5 + i * 0.3:.1f}s" repeatCount="indefinite"
      begin="{delay:.1f}s"/>
  </circle>''')

    # Scanline effect
    scanlines = ""
    for s in range(0, HEIGHT, 4):
        scanlines += f'<line x1="0" y1="{s}" x2="{WIDTH}" y2="{s}" stroke="#00d9ff" stroke-width="0.2" opacity="0.03"/>'

    svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{WIDTH}" height="{HEIGHT}" viewBox="0 0 {WIDTH} {HEIGHT}">
  <defs>
    <!-- Glow filters -->
    <filter id="glowLow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowMid" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 2 2 0 0  0 2 2 0 0.5  0 2 2 0 1  0 0 0 1 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowHigh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 2 2 0 0  0 2 2 0 0.85  0 2 2 0 1  0 0 0 1 0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#0a0a1e"/>
      <stop offset="100%" style="stop-color:#000d1a"/>
    </linearGradient>
    <!-- Cyber grid pattern -->
    <pattern id="grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#00d9ff" stroke-width="0.15" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="{WIDTH}" height="{HEIGHT}" fill="url(#bgGrad)" rx="8"/>
  <rect width="{WIDTH}" height="{HEIGHT}" fill="url(#grid)" rx="8" opacity="0.4"/>

  <!-- Scanlines -->
  {scanlines}

  <!-- Stars / Barcelona dots -->
  {''.join(stars)}

  <!-- Contribution squares -->
  {''.join(squares)}

  <!-- Matrix rain -->
  {''.join(matrix_chars)}

  <!-- Cyan wave sweep -->
  {''.join(wave_paths)}

  <!-- Lightning bolts -->
  {''.join(lightning_bolts)}

  <!-- Border glow -->
  <rect width="{WIDTH - 1}" height="{HEIGHT - 1}" x="0.5" y="0.5" 
    fill="none" stroke="#00d9ff" stroke-width="1" rx="8" opacity="0.4">
    <animate attributeName="opacity"
      values="0.4;0.8;0.4"
      dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <polyline points="0,20 0,0 20,0" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.8"/>
  <polyline points="{WIDTH-20},0 {WIDTH},0 {WIDTH},20" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.8"/>
  <polyline points="0,{HEIGHT-20} 0,{HEIGHT} 20,{HEIGHT}" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.8"/>
  <polyline points="{WIDTH-20},{HEIGHT} {WIDTH},{HEIGHT} {WIDTH},{HEIGHT-20}" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Top label -->
  <text x="12" y="10" fill="#00d9ff" font-family="monospace" font-size="7" opacity="0.6">AGABA916::CONTRIBUTION_MATRIX</text>
  <text x="{WIDTH - 80}" y="10" fill="#a50044" font-family="monospace" font-size="7" opacity="0.6">FCB::VISCA_BARCA</text>
</svg>'''

    return svg


if __name__ == "__main__":
    svg_content = generate_svg()
    with open("cyber_nebula.svg", "w") as f:
        f.write(svg_content)
    print("✅ cyber_nebula.svg generated successfully!")
